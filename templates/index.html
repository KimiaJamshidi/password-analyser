<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyser</title>
</head>
<body>
    <h1>Password Strength Analyser</h1>

    <form method="POST" action="/analyse">
        <input type="text" name="password" placeholder="Enter a password..." />
        <button type="submit">Analyse</button>
    </form>

    {% if strength %}
        <h2>Result for: {{ password }}</h2>
        <h3>Strength: {{ strength }}</h3>

        {% if feedback %}
            <p>How to improve:</p>
            <ul>
                {% for tip in feedback %}
                    <li>{{ tip }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>Your password passed all checks! 🎉</p>
        {% endif %}
    {% endif %}

</body>
</html>
